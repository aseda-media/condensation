name: Feature request
description: Suggest a new capability or parameter for the Condensation HDAs.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: hda
    attributes:
      label: Which HDA is this for?
      options:
        - am_Condensation_Source
        - am_Condensation_Solver
        - am_Condensation_Surface
        - New / cross-cutting
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to achieve?
      description: The look or workflow you're after, and what's blocking it today.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: How you imagine it working (a parameter, a mode, etc.). Rough ideas are welcome.
    validations:
      required: false
  - type: textarea
    id: refs
    attributes:
      label: References
      description: Links or images of the effect you want.
    validations:
      required: false
